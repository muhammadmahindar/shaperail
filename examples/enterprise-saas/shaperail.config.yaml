project: enterprise-saas
port: 3000
workers: auto

database:
  type: postgresql
  host: ${DB_HOST:localhost}
  port: 5432
  name: enterprise_saas
  pool_size: 20

cache:
  type: redis
  url: redis://${REDIS_HOST:localhost}:6379

auth:
  provider: jwt
  secret_env: JWT_SECRET
  expiry: 24h
  refresh_expiry: 30d

logging:
  level: info
  format: json
